# === CONFIGURACIÓN DEL SERVICIO RUTAS ===
spring.application.name=rutas
server.port=8080

spring.datasource.url=jdbc:postgresql://db_rutas:5432/db_rutas
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=user
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/tp-backend

# === CLIENT CREDENTIALS CONFIG ===
spring.security.oauth2.client.registration.ms-rutas.provider=keycloak
spring.security.oauth2.client.registration.ms-rutas.client-id=ms-rutas
spring.security.oauth2.client.registration.ms-rutas.client-secret=pbH4pkH2v2Jh6zTFnx7htgnqXlzJufvK
spring.security.oauth2.client.registration.ms-rutas.authorization-grant-type=client_credentials

spring.security.oauth2.client.provider.keycloak.token-uri=http://keycloak:8080/realms/tp-backend/protocol/openid-connect/token

# =========== LOGGING CONFIG ===========
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.ar.edu.utn.frc.backend=DEBUG

# Logs de SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Archivo de logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %level - %msg%n
