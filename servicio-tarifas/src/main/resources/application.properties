# === CONFIGURACIÓN DEL SERVICIO TARIFAS ===
spring.application.name=tarifas
server.port=8080

spring.datasource.url=jdbc:postgresql://db_tarifas:5432/db_tarifas
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=user
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/tp-backend

# === CLIENT CREDENTIALS CONFIG ===
spring.security.oauth2.client.registration.ms-tarifas.provider=keycloak
spring.security.oauth2.client.registration.ms-tarifas.client-id=ms-tarifas
spring.security.oauth2.client.registration.ms-tarifas.client-secret=5qEZ3oCQuNZvBuQ52CgM6vSXhpGjpDsZ
spring.security.oauth2.client.registration.ms-tarifas.authorization-grant-type=client_credentials

spring.security.oauth2.client.provider.keycloak.token-uri=http://keycloak:8080/realms/tp-backend/protocol/openid-connect/token

# =========== KAFKA CONFIG ===========
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=tarifas-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=\
    ar.edu.utn.frc.backend.personas.event.CamionCreadoEvent:\
    ar.edu.utn.frc.backend.tarifas.event.CamionCreadoEvent,\
    ar.edu.utn.frc.backend.personas.event.CamionEliminadoEvent:\
    ar.edu.utn.frc.backend.tarifas.event.CamionEliminadoEvent

# =========== LOGGING CONFIG ===========
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.ar.edu.utn.frc.backend=DEBUG

# Logs de SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Archivo de logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %level - %msg%n
